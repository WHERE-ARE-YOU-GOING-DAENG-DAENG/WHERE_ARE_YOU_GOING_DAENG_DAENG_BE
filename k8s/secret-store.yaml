# k8s/secret-store.yaml (최종 확인 필요)
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  # SecretStore 이름 (ExternalSecret에서 이 이름 참조)
  name: aws-secret-store
  # 애플리케이션 및 ExternalSecret과 동일한 네임스페이스
  namespace: dang-dang-spring-ns
spec:
  provider:
    aws:
      service: SecretsManager
      # [사용자 확인 필요] 실제 사용하는 AWS 리전이 맞는지 확인하세요.
      region: ap-northeast-2
      auth:
        jwt:
          serviceAccountRef:
            # [사용자 확인 필요] Terraform/Helm으로 ESO 설치 시 사용한 Service Account 이름이 맞는지 확인하세요. (보통 'external-secrets')
            name: external-secrets
            # [사용자 확인 필요] Terraform/Helm으로 ESO를 설치한 네임스페이스가 맞는지 확인하세요. (보통 'external-secrets')
            namespace: external-secrets