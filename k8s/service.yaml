apiVersion: v1
kind: Service
metadata:
  # 서비스 이름: 앱 이름 기반으로 설정
  name: dang-dang-spring-service
  # 사용할 네임스페이스: Rollout과 동일한 네임스페이스
  namespace: dang-dang-spring-ns
  # 서비스 자체 식별 레이블 (선택적)
  labels:
    app: dang-dang-spring
spec:
  # 이 서비스가 트래픽을 전달할 Pod를 선택 (Rollout의 Pod 레이블과 일치)
  selector:
    app: dang-dang-spring
  ports:
    # 포트 매핑 이름 (ServiceMonitor 등에서 참조 용이)
    - name: http
      protocol: TCP
      # 서비스가 클러스터 내/외부에 노출할 포트
      port: 80
      # 실제 Pod(컨테이너)가 리스닝하는 포트 (Rollout의 containerPort와 일치)
      targetPort: 8080

  # --- 서비스 타입 결정 (중요!) ---
  # ClusterIP: 클러스터 내부에서만 접근 가능한 IP를 할당합니다. (가장 일반적)
  #            보통 Ingress Controller나 다른 프록시(예: Terraform의 Nginx 모듈)를 통해
  #            외부 트래픽을 받아 이 ClusterIP 서비스로 라우팅하는 구조에서 사용됩니다.
  #            Nginx 모듈을 LoadBalancer 타입으로 사용 중이시라면, 이 Spring Boot 서비스는 ClusterIP가 적합할 가능성이 높습니다.
  type: ClusterIP