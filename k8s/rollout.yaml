# k8s/rollout.yaml
# Argo Rollouts 리소스: dang-dang-spring 앱 배포 및 카나리 전략 관리

apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: dang-dang-spring-rollout
  namespace: dang-dang-spring-ns
  labels:
    app: dang-dang-spring
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dang-dang-spring

  template:
    metadata:
      annotations:
        secret.reloader.stakater.com/reload: "my-app-db-secret"
      labels:
        app: dang-dang-spring
    spec:

      containers:
        - name: dang-dang-spring-container # 컨테이너 이름
          image: 911167897987.dkr.ecr.ap-northeast-2.amazonaws.com/app_repo_ecr:latest
          imagePullPolicy: Always # 또는 IfNotPresent
          ports:
            - containerPort: 8080
          # --- Liveness Probe ---
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8080 }
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          # --- Readiness Probe ---
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          resources:
            requests: { memory: "512Mi", cpu: "250m" } # [확인] 앱에 맞게 조절
            limits: { memory: "1Gi", cpu: "500m" }    # [확인] 앱에 맞게 조절

          envFrom:
            - secretRef:
                name: my-app-db-secret

  strategy:
    canary:
      steps:
        - setCanaryScale:
            replicas: 1
        - pause: { duration: 45s }
        - analysis:
            templates:
              - templateName: dang-dang-spring-prometheus-metrics
            args:
              - name: app-label-value
                value: dang-dang-spring
