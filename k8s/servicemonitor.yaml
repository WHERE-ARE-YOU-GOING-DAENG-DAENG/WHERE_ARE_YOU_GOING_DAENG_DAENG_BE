apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: dang-dang-spring-servicemonitor
  namespace: monitoring
  labels:
    release: prometheus-stack
spec:
  selector:
    matchLabels:
      app: dang-dang-spring
  namespaceSelector:
    matchNames:
      - dang-dang-spring-ns
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
      scrapeTimeout: 10s